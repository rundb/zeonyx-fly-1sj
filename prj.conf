# Shell over UART (PA2=TX, PA3=RX via USART2)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Kernel log output to shell
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=n

# Optional: increase shell history and line buffer
CONFIG_SHELL_HISTORY_BUFFER=512
CONFIG_SHELL_CMD_BUFF_SIZE=256

# Kernel shell commands (uptime, threads, etc.)
CONFIG_KERNEL_SHELL=y
CONFIG_DEVICE_SHELL=y

# SPI bus for SX1262
CONFIG_SPI=y
