# Shell over UART (PA2=TX, PA3=RX via USART2)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="lora:~$ "

# Kernel log output to shell
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BUFFER_SIZE=512

# Shell RAM budget (STM32L072CZ has only 20 KiB RAM)
CONFIG_SHELL_STACK_SIZE=1536
CONFIG_SHELL_HISTORY_BUFFER=128
CONFIG_SHELL_CMD_BUFF_SIZE=128

# Kernel shell commands (uptime, threads, etc.)
CONFIG_KERNEL_SHELL=y
CONFIG_DEVICE_SHELL=y

# Debug build: debug symbols + debug-friendly optimization (-Og)
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_DEBUG_INFO=y

# SPI bus + LoRa subsystem for SX1262
CONFIG_SPI=y
CONFIG_LORA=y
CONFIG_LORA_LOG_LEVEL_INF=y
CONFIG_LORA_SX126X=y

CONFIG_REBOOT=y

# ── SMP coprocessor interface (USART1: PA9=TX, PA10=RX, 921600 baud) ─────────
# MCUMgr SMP over UART — handles structured commands from the main MCU.
# The chosen node zephyr,uart-mcumgr = &usart1 selects the physical interface.
CONFIG_MCUMGR=y
CONFIG_MCUMGR_LOG_LEVEL_DBG=y
CONFIG_MCUMGR_TRANSPORT_UART=y
# MTU must be <= NETBUF_SIZE + 2; 128 fits in 130-byte headroom
CONFIG_MCUMGR_TRANSPORT_UART_MTU=128
# MCUMGR_TRANSPORT_UART_ASYNC is NOT set — use interrupt-driven mode (matches defconfig)
# Net buf pool: 2 × 128 B = 256 B (default 4 × 384 = 1536 B)
CONFIG_MCUMGR_TRANSPORT_NETBUF_COUNT=2
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=128
CONFIG_NET_BUF=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_ZCBOR=y
CONFIG_ZCBOR_STOP_ON_ERROR=y
# Built-in OS group: exposes uptime/reset over SMP (optional, ~1 kB flash)
CONFIG_MCUMGR_GRP_OS=y

# ── SMP command notification hooks (task_smp_uart.c) ─────────────────────────
# Enables mgmt_callback_register() and the MGMT_EVT_OP_CMD_RECV event.
CONFIG_MCUMGR_MGMT_NOTIFICATION_HOOKS=y
CONFIG_MCUMGR_SMP_COMMAND_STATUS_HOOKS=y

#CONFIG_UART_MCUMGR_LOG_LEVEL_DBG=y